networks:
    cassandraNet:
        name: cassandraNet
        driver: bridge

services:
    cas1:
        image: cassandra:latest
        container_name: cas1
        networks:
            - cassandraNet
        ports:
            - 127.0.0.1:9042:9042
        restart: on-failure
        healthcheck:
            test: ["CMD-SHELL", "nodetool status"]
            interval: 2m
            start_period: 2m
            timeout: 10s
            retries: 3
    cas2:
        image: cassandra:latest
        container_name: cas2
        hostname: cas2
        networks:
            - cassandraNet
        ports:
            - 127.0.0.2:9042:9042
        environment:
            - CASSANDRA_SEEDS=cas1
        depends_on:
            cas1:
                condition: service_healthy
        restart: on-failure
        healthcheck:
            test: ["CMD-SHELL", "nodetool status"]
            interval: 2m
            start_period: 2m
            timeout: 10s
            retries: 3
    cas3:
        image: cassandra:latest
        container_name: cas3
        hostname: cas3
        networks:
            - cassandraNet
        ports:
            - 127.0.0.3:9042:9042
        environment:
            - CASSANDRA_SEEDS=cas1
        depends_on:
            - cas2
        restart: on-failure
        healthcheck:
            test: ["CMD-SHELL", "nodetool status"]
            interval: 2m
            start_period: 2m
            timeout: 10s
            retries: 3
